apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: opencost
  name: opencost
  namespace: opencost
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opencost
  template:
    metadata:
      labels:
        app: opencost
    spec:
      # ============================================
      # 貨幣設定: CNY 修改 (2026-05-25)
      # ============================================
      # 由於 OpenCost UI 1.118.0 將 USD 硬編碼在 JS 中，
      # 使用 initContainer + ConfigMap 方式在啟動時 patch 為 CNY。
      # 無需匯率轉換，僅修改幣值符號顯示。
      # --------------------------------------------
      initContainers:
      - name: patch-currency
        image: busybox:1.36
        command: ["sh", "-c"]
        args:
        - |
          cp /opt/ui/dist/opencost-ui.5f027c83.js /tmp-patched/ && \
          sed -i 's/"USD"/"CNY"/g' /tmp-patched/opencost-ui.5f027c83.js && \
          cp /opt/ui/dist/opencost-ui.c57fa29e.js /tmp-patched/ && \
          sed -i 's/"USD"/"CNY"/g' /tmp-patched/opencost-ui.c57fa29e.js && \
          echo "Currency patched to CNY"
        volumeMounts:
        - name: ui-files
          mountPath: /tmp-patched
      # ============================================

      containers:
      - name: opencost
        image: public.ecr.aws/h4m7v9o4/ghcr.io/opencost/opencost:1.118.0
        env:
        - name: PROMETHEUS_SERVER_ENDPOINT
          value: "http://prometheus.monitoring.svc:9090"
        # AWS 中国区 EC2 定价 API URL
        # 注意: AWS 中国区使用独立的定价 endpoint，与全球区不同
        - name: AWS_PRICING_URL
          value: "https://pricing.cn-northwest-1.amazonaws.com.cn/offers/v1.0/cn/AmazonEC2/current/index.json"
        - name: CLUSTER_ID
          value: "cluster-one"
        # 启用 idle cost 分离，使未分配资源成本单独显示
        - name: IDLE_ENABLED
          value: "true"
        ports:
        - containerPort: 8081
          name: mcp
          protocol: TCP
        resources:
          limits:
            cpu: 999m
            memory: 1G
          requests:
            cpu: 10m
            memory: 55M
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
          readOnlyRootFilesystem: true
          runAsUser: 1001
        volumeMounts:
        - mountPath: /var/configs
          name: pricing-config

      - name: opencost-ui
        image: public.ecr.aws/h4m7v9o4/ghcr.io/opencost/opencost-ui:1.118.0
        env:
        - name: PROMETHEUS_SERVER_ENDPOINT
          value: "http://prometheus.monitoring.svc:9090"
        ports:
        - containerPort: 9090
          name: opencost-ui
          protocol: TCP
        resources:
          limits:
            cpu: 999m
            memory: 1G
          requests:
            cpu: 10m
            memory: 55M
        # ============================================
        # CNY 貨幣 patch 掛載 (2026-05-25)
        # 使用自定義啟動腳本替換原始 entrypoint，
        # 在啟動 nginx 前執行貨幣 patch 並生成 nginx 配置。
        # --------------------------------------------
        command: ["/bin/sh"]
        args: ["/patch.sh"]
        securityContext:
          runAsUser: 0
        volumeMounts:
        - name: cny-patch
          mountPath: /patch.sh
          subPath: "patch.sh"
        - name: ui-files
          mountPath: /opt/ui/dist/opencost-ui.5f027c83.js
          subPath: opencost-ui.5f027c83.js
        - name: ui-files
          mountPath: /opt/ui/dist/opencost-ui.c57fa29e.js
          subPath: opencost-ui.c57fa29e.js
        # ============================================

      serviceAccount: opencost
      restartPolicy: Always

      # ============================================
      # Volumes for CNY patch (2026-05-25)
      # ============================================
      volumes:
      - name: pricing-config
        configMap:
          name: aws-pricing-config
      - name: ui-files
        emptyDir: {}
      - name: cny-patch
        configMap:
          name: cny-patch-root-v3
          defaultMode: 493
      # ============================================
