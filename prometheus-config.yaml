# Prometheus 配置 for EKS chris-eks cluster
# Namespace: monitoring
# ConfigMap: prometheus-config
#
# 变更记录:
#   2026-05-25: 新增 opencost scrape job (port 9003)
#   2026-05-25: 新增 kubernetes-cadvisor scrape job (kubelet /metrics/cadvisor)
#   2026-05-25: 修复 rules.yml 缺失导致的 CrashLoopBackOff

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: chris-eks

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /opt/bitnami/prometheus/conf/rules.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']

  - job_name: 'node-exporter'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - monitoring
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: node-exporter
      - source_labels: [__meta_kubernetes_pod_ip]
        action: replace
        target_label: __address__
        regex: (.+)
        replacement: ${1}:9100

  - job_name: 'kube-state-metrics'
    static_configs:
      - targets: ['kube-state-metrics.monitoring.svc.cluster.local:8080']

  # 2026-05-25 新增: 抓取 OpenCost 指标 (node_cpu_hourly_cost, node_ram_hourly_cost 等)
  - job_name: 'opencost'
    static_configs:
      - targets: ['opencost.opencost.svc:9003']

  # 2026-05-25 新增: 抓取 kubelet cadvisor 容器指标
  # 需要 Prometheus SA 具有 nodes/proxy 权限 (已配置在 clusterrole/prometheus)
  - job_name: 'kubernetes-cadvisor'
    kubernetes_sd_configs:
      - role: node
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      insecure_skip_verify: true
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)
      - target_label: __address__
        replacement: kubernetes.default.svc:443
      - source_labels: [__meta_kubernetes_node_name]
        regex: (.+)
        target_label: __metrics_path__
        replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor
