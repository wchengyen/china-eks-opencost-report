apiVersion: v1
kind: ConfigMap
metadata:
  name: cny-patch-root-v3
  namespace: opencost
data:
  patch.sh: |
    #!/bin/sh
    # ============================================
    # OpenCost CNY 貨幣 Patch 腳本 (2026-05-25)
    # ============================================
    # 功能:
    #   1. 將 UI JS 檔案中的 USD 替換為 CNY
    #   2. 複製 UI 檔案到 nginx root
    #   3. 生成 nginx 配置
    #   4. 啟動 nginx
    #
    # 注意:
    #   - 無需匯率轉換，僅修改幣值符號
    #   - API (/allocation/compute) 仍返回純數字
    #   - 貨幣顯示由 UI 層處理
    # ============================================

    # Patch currency in the source files
    sed -i 's/"USD"/"CNY"/g' /opt/ui/dist/opencost-ui.5f027c83.js
    sed -i 's/"USD"/"CNY"/g' /opt/ui/dist/opencost-ui.c57fa29e.js

    # Copy UI files to nginx root
    cp -r /opt/ui/dist/* /var/www/

    # Generate nginx config from template
    export API_SERVER=opencost
    export API_PORT=9003
    export UI_PORT=9090
    export UI_PATH=/
    export BASE_URL=/model
    envsubst '$API_SERVER $API_PORT $UI_PORT $UI_PATH $BASE_URL' \
      < /etc/nginx/conf.d/default.nginx.conf.template \
      > /etc/nginx/conf.d/default.conf

    # Start nginx
    exec nginx -g 'daemon off;'
