apiVersion: v1
kind: Service
metadata:
  name: opencost
  namespace: opencost
spec:
  type: ClusterIP
  ports:
  - name: opencost
    port: 9003
    protocol: TCP
    targetPort: 9003
  - name: opencost-ui
    port: 9090
    protocol: TCP
    targetPort: 9090
  - name: mcp
    port: 8081
    protocol: TCP
    targetPort: 8081
  selector:
    app: opencost
