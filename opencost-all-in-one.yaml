# OpenCost 完整部署配置 (含 CNY 貨幣設定)
# 使用方法: kubectl apply -f opencost-all-in-one.yaml
#
# 2026-05-25 更新:
#   - 新增 CNY 貨幣 patch (無需匯率轉換，僅修改幣值符號)
#   - 使用 initContainer + emptyDir + ConfigMap 方式 patch UI JS
#   - 移除不必要的 CLOUD_PROVIDER_API_KEY (AWS 环境无需 Google API Key)
#   - 添加 AWS_PRICING_URL 注释说明
#   - 保留 IDLE_ENABLED 支持空闲成本分离
#
# 注意:
#   - initContainer 使用 opencost-ui image 自身，避免 busybox 拉取問題
#   - 若需分步部署，請使用 opencost-cny-patch-configmap.yaml + opencost-deployment.yaml

apiVersion: v1
kind: Namespace
metadata:
  name: opencost
  labels:
    app: opencost

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: opencost
  namespace: opencost

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: opencost
rules:
- apiGroups: [""]
  resources:
  - configmaps
  - deployments
  - nodes
  - pods
  - services
  - resourcequotas
  - replicationcontrollers
  - limitranges
  - persistentvolumeclaims
  - persistentvolumes
  - namespaces
  - endpoints
  verbs: ["get", "list", "watch"]
- apiGroups: ["extensions"]
  resources:
  - daemonsets
  - deployments
  - replicasets
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources:
  - statefulsets
  - deployments
  - daemonsets
  - replicasets
  verbs: ["list", "watch"]
- apiGroups: ["batch"]
  resources:
  - cronjobs
  - jobs
  verbs: ["get", "list", "watch"]
- apiGroups: ["autoscaling"]
  resources:
  - horizontalpodautoscalers
  verbs: ["get", "list", "watch"]
- apiGroups: ["policy"]
  resources:
  - poddisruptionbudgets
  verbs: ["get", "list", "watch"]
- apiGroups: ["storage.k8s.io"]
  resources:
  - storageclasses
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: opencost
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: opencost
subjects:
- kind: ServiceAccount
  name: opencost
  namespace: opencost

---
apiVersion: v1
kind: Service
metadata:
  name: opencost
  namespace: opencost
spec:
  type: ClusterIP
  ports:
  - name: opencost
    port: 9003
    protocol: TCP
    targetPort: 9003
  - name: opencost-ui
    port: 9090
    protocol: TCP
    targetPort: 9090
  - name: mcp
    port: 8081
    protocol: TCP
    targetPort: 8081
  selector:
    app: opencost

---
# CNY Patch ConfigMap
# 將 OpenCost UI 的預設貨幣從 USD 改為 CNY
apiVersion: v1
kind: ConfigMap
metadata:
  name: cny-patch-root-v3
  namespace: opencost
data:
  patch.sh: |
    #!/bin/sh
    # OpenCost CNY 貨幣 Patch 腳本
    # 功能:
    #   1. 將 UI JS 檔案中的 USD 替換為 CNY
    #   2. 複製 UI 檔案到 nginx root (/var/www)
    #   3. 使用 envsubst 生成 nginx 配置
    #   4. 啟動 nginx
    # 注意: 無需匯率轉換，僅修改幣值符號顯示

    sed -i 's/"USD"/"CNY"/g' /opt/ui/dist/opencost-ui.5f027c83.js
    sed -i 's/"USD"/"CNY"/g' /opt/ui/dist/opencost-ui.c57fa29e.js
    cp -r /opt/ui/dist/* /var/www/

    export API_SERVER=opencost API_PORT=9003 UI_PORT=9090 UI_PATH=/ BASE_URL=/model
    envsubst '$API_SERVER $API_PORT $UI_PORT $UI_PATH $BASE_URL' \
      < /etc/nginx/conf.d/default.nginx.conf.template \
      > /etc/nginx/conf.d/default.conf

    exec nginx -g 'daemon off;'

---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: opencost
  name: opencost
  namespace: opencost
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opencost
  template:
    metadata:
      labels:
        app: opencost
    spec:
      # ============================================
      # CNY 貨幣 Patch InitContainer
      # ============================================
      # 由於 opencost-ui container 使用 readOnlyRootFilesystem，
      # 使用 initContainer (以 root 運行) 預先 patch JS 檔案到 emptyDir。
      # ============================================
      initContainers:
      - name: patch-currency
        image: public.ecr.aws/h4m7v9o4/ghcr.io/opencost/opencost-ui:1.118.0
        command: ["sh", "-c"]
        args:
        - |
          cp /opt/ui/dist/opencost-ui.5f027c83.js /tmp-patched/ && \
          sed -i 's/"USD"/"CNY"/g' /tmp-patched/opencost-ui.5f027c83.js && \
          cp /opt/ui/dist/opencost-ui.c57fa29e.js /tmp-patched/ && \
          sed -i 's/"USD"/"CNY"/g' /tmp-patched/opencost-ui.c57fa29e.js && \
          echo "Currency patched to CNY"
        volumeMounts:
        - name: ui-files
          mountPath: /tmp-patched
      # ============================================

      containers:
      - name: opencost
        image: public.ecr.aws/h4m7v9o4/ghcr.io/opencost/opencost:1.118.0
        env:
        - name: PROMETHEUS_SERVER_ENDPOINT
          value: "http://prometheus.monitoring.svc:9090"
        # AWS 中国区 EC2 定价 API URL
        # 注意: AWS 中国区使用独立的定价 endpoint，与全球区不同
        - name: AWS_PRICING_URL
          value: "https://pricing.cn-northwest-1.amazonaws.com.cn/offers/v1.0/cn/AmazonEC2/current/index.json"
        - name: CLUSTER_ID
          value: "cluster-one"
        # 启用 idle cost 分离，使未分配资源成本单独显示
        - name: IDLE_ENABLED
          value: "true"
        ports:
        - containerPort: 8081
          name: mcp
          protocol: TCP
        resources:
          limits:
            cpu: 999m
            memory: 1G
          requests:
            cpu: 10m
            memory: 55M
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
          readOnlyRootFilesystem: true
          runAsUser: 1001
        volumeMounts:
        - mountPath: /var/configs
          name: pricing-config

      - name: opencost-ui
        image: public.ecr.aws/h4m7v9o4/ghcr.io/opencost/opencost-ui:1.118.0
        env:
        - name: PROMETHEUS_SERVER_ENDPOINT
          value: "http://prometheus.monitoring.svc:9090"
        ports:
        - containerPort: 9090
          name: opencost-ui
          protocol: TCP
        resources:
          limits:
            cpu: 999m
            memory: 1G
          requests:
            cpu: 10m
            memory: 55M
        # ============================================
        # CNY Patch: 使用自定義啟動腳本
        # ============================================
        # 以 root 運行以獲得寫入權限，執行 patch 後啟動 nginx
        # ============================================
        command: ["/bin/sh"]
        args: ["/patch.sh"]
        securityContext:
          runAsUser: 0
        volumeMounts:
        - name: cny-patch
          mountPath: /patch.sh
          subPath: "patch.sh"
        - name: ui-files
          mountPath: /opt/ui/dist/opencost-ui.5f027c83.js
          subPath: opencost-ui.5f027c83.js
        - name: ui-files
          mountPath: /opt/ui/dist/opencost-ui.c57fa29e.js
          subPath: opencost-ui.c57fa29e.js
        # ============================================

      serviceAccount: opencost
      restartPolicy: Always

      # ============================================
      # Volumes for CNY patch
      # ============================================
      volumes:
      - name: pricing-config
        configMap:
          name: aws-pricing-config
      - name: ui-files
        emptyDir: {}
      - name: cny-patch
        configMap:
          name: cny-patch-root-v3
          defaultMode: 493
      # ============================================
